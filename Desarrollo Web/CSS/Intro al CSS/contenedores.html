<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Contenedores</title>
	<style>
		#principal{
			display: flex;
			justify-content: center;
			align-content: center;
			flex-wrap: wrap;
		}

		.contenedor{
			background-color: #44F07F;
			width: 200px;
			height: 200px;
			margin: 20px;

			display: flex;
			justify-self: center; /*Centra en horizontal*/
			align-content: center; /*Centra en vertical*/
		}

		.contenedor:hover{
			background-color: #F527EE;
		}

		@media(max-width: 1024px) {
			.contenedor{
				width: 45%;
				background-color: #DDD;
				font-size: 25px;
			}
		}

		@media(max-width: 764px) {
			.contenedor{
				width: 100%;
				background-color: #FAB;
				font-size: 40px;
			}
		}
	</style>
</head>
<body>
	<div id="principal">
		<div class="contenedor">Contenedor 1</div>
		<div class="contenedor">Contenedor 2</div>
		<div class="contenedor">Contenedor 3</div>
		<div class="contenedor">Contenedor 4</div>
		<div class="contenedor">Contenedor 5</div>
	</div>

</body>
</html>
