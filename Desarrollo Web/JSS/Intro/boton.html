<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Listener</title>

	<style>
		button{
			background-attachment: #5060FF;
			color: white;
			padding: 10px, 15px;
			border: none;
			background-origin: 25px;
		}
		button:hover{
			
		}
	</style>
</head>
<body>
	<button id="btnMostrar">Mostrar</button>
	<script>
		const boton = document.getElementById("btnMostrar");
		boton.addEventListener("click", function(){
			alert("Felicidades diste un click");
		});
	</script>
</body>
</html>
